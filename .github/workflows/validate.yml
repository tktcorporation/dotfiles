name: Validate

on:
  pull_request:
    paths:
      - Brewfile
      - .chezmoi.yaml.tmpl
      - "*.tmpl"
      - "dot_*"
      - "private_dot_*"
      - "run_*"

jobs:
  brewfile:
    name: Validate Brewfile
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check formulae exist
        run: |
          errors=0
          while IFS= read -r formula; do
            if ! brew info "$formula" &>/dev/null; then
              echo "::error::Formula not found: $formula"
              errors=$((errors + 1))
            fi
          done < <(grep '^\s*brew "' Brewfile | sed 's/.*brew "\([^"]*\)".*/\1/')

          if [ "$errors" -gt 0 ]; then
            echo "::error::$errors formula(e) not found in Homebrew"
            exit 1
          fi
          echo "All formulae validated"

      - name: Check casks exist
        run: |
          errors=0
          while IFS= read -r cask; do
            if ! brew info --cask "$cask" &>/dev/null; then
              echo "::error::Cask not found: $cask"
              errors=$((errors + 1))
            fi
          done < <(grep '^\s*cask "' Brewfile | sed 's/.*cask "\([^"]*\)".*/\1/')

          if [ "$errors" -gt 0 ]; then
            echo "::error::$errors cask(s) not found in Homebrew"
            exit 1
          fi
          echo "All casks validated"

  chezmoi:
    name: Validate chezmoi templates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install chezmoi
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b /usr/local/bin

      - name: Validate templates (syntax check)
        run: |
          # chezmoi doctor verifies the source directory is valid
          # Use --no-pager to avoid interactive output
          chezmoi --source="$(pwd)" verify 2>&1 || true

          # Basic Go template syntax validation
          errors=0
          for f in $(find . -name '*.tmpl' -not -path './.git/*'); do
            # Check for unmatched {{ }} pairs (basic syntax validation)
            open_count=$(grep -o '{{' "$f" | wc -l | tr -d ' ')
            close_count=$(grep -o '}}' "$f" | wc -l | tr -d ' ')
            if [ "$open_count" != "$close_count" ]; then
              echo "::error::Unmatched template delimiters in $f ({{ count: $open_count, }} count: $close_count)"
              errors=$((errors + 1))
            fi
          done

          if [ "$errors" -gt 0 ]; then
            echo "::error::$errors template(s) have syntax issues"
            exit 1
          fi
          echo "All templates validated"
